{% extends "base.html" %}
{% block title_suffix %} — Change password{% endblock %}
{% block content %}
<div class="card narrow">
  <h2>{% if forced %}You must change your password{% else %}Change password{% endif %}</h2>
  {% if forced %}<p class="muted small">This is required before you can use the server.</p>{% endif %}
  <form method="post">
    <label>Current password
      <input type="password" name="current_password" autocomplete="current-password" required autofocus>
    </label>
    <label>New password (min 8 chars)
      <input type="password" name="new_password" autocomplete="new-password" minlength="8" required>
    </label>
    <label>Confirm new password
      <input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required>
    </label>
    <button class="primary" type="submit">Update password</button>
  </form>
</div>
{% endblock %}
