{% extends "base.html" %}
{% block title_suffix %} — Incoming data{% endblock %}
{% block content %}
<h2>Incoming data</h2>
<div class="toolbar">
  <label>Filter by node
    <select id="filter-node"><option value="">All nodes</option></select>
  </label>
  <button id="toggle-pause" class="small">Pause</button>
  <button class="small" onclick="ais.clearStream('incoming')">Clear</button>
  <button class="small" onclick="ais.exportCsv('incoming')">Export CSV</button>
</div>
<pre class="stream" id="stream-incoming"></pre>
{% endblock %}
{% block scripts %}
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>ais.dataIn();</script>
{% endblock %}
