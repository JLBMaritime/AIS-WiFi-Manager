# NetworkManager dnsmasq-shared.d drop-in for the AIS-WiFi management AP.
#
# This file ONLY affects the per-AP `dnsmasq` instance that NetworkManager
# spawns when a connection uses `ipv4.method shared` (i.e. our `ais-hotspot`
# profile on wlan1).  It does NOT touch the host's resolver chain,
# /etc/resolv.conf, Tailscale's MagicDNS, or anything else.
#
# Why this file exists
# --------------------
# Without it, the per-AP dnsmasq forwards client DNS queries to whatever
# /etc/resolv.conf currently lists.  On a Pi running both NetworkManager
# (uplink on wlan0) AND Tailscale (MagicDNS on 100.100.100.100), those
# two daemons take turns rewriting /etc/resolv.conf every 30-90 s, and
# `dnsmasq` re-reads it each time.  An iPhone joining the AP runs its
# captive-portal probe (`GET http://captive.apple.com/hotspot-detect.html`)
# during one of those flap windows, the DNS lookup times out, and iOS
# either refuses to join ("Unable to join this network") or joins but
# refuses to pass any traffic — meaning http://192.168.4.1/ stays blank.
#
# Pinning the AP-side resolver to public Anycast servers (1.1.1.1 etc.)
# makes the AP completely independent of /etc/resolv.conf and of
# Tailscale's state.  Validated by `validate_nm_conf()` in install.sh
# and re-checked by `sudo ais-wifi-cli doctor` so a future regression
# won't silently come back.
#
# IMPORTANT: comments here use `#`, NOT `;`. (See wifi-powersave-off.conf
# for the long story; glib's keyfile parser on Debian 13 trixie rejects
# `;`-comments and crash-loops NetworkManager.)

# Don't read /etc/resolv.conf at all — that's the file Tailscale and NM
# fight over.  The AP must not depend on either.
no-resolv

# Public Anycast resolvers, primary + secondary + tertiary.  Cloudflare
# first because they typically answer in <10 ms from any consumer ISP.
server=1.1.1.1
server=1.0.0.1
server=8.8.8.8

# Cache aggressively — the same handful of domains (apple.com,
# google.com, microsoft.com captive-portal probes) get hit by every
# joining client.
cache-size=1000

# Stop dnsmasq logging every single query at info level — fills the
# journal at ~1 line/sec when there are several clients.
quiet-dhcp
quiet-dhcp6

# Captive-portal probe hijack — belt to the upstream-pin's braces.
# Each of these probe URLs is what iOS / Android / Windows use to
# decide "is this Wi-Fi useful?".  By pointing the hostnames at
# 192.168.4.1 we make our own Flask app answer them with the magic
# strings each OS expects (see app/routes.py).  This is what makes
# iOS show "Connected" instantly with no captive-portal sheet, even
# if the upstream is briefly slow.
#
# These four cover ~99 % of devices in the wild.  Apple and Google
# are tested; Windows and Microsoft are speculative-but-harmless.
address=/captive.apple.com/192.168.4.1
address=/connectivitycheck.gstatic.com/192.168.4.1
address=/clients3.google.com/192.168.4.1
address=/www.msftconnecttest.com/192.168.4.1
address=/www.msftncsi.com/192.168.4.1
