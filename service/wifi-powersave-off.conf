# NetworkManager drop-in: disable Wi-Fi power-save permanently.
#
# The brcmfmac driver on Pi 4B is known to freeze the wlan0 interface
# after several hours when power-save is on.  Setting wifi.powersave=2
# (= disabled) tells NetworkManager to apply ``iw dev wlan0 set
# power_save off`` to every Wi-Fi connection it manages.
#
# IMPORTANT: comments here MUST start with `#`, not `;`.
#   NetworkManager parses this file with glib's keyfile reader, and
#   from glib 2.78 onwards (NM 1.52 / Debian 13 trixie) `;` is rejected
#   as not-a-comment, NM exits 1, crash-loops 5x, then permanently
#   fails to start — taking wlan0, wlan1 and SSH down with it.
#   The same lesson is enforced by validate_nm_conf() in install.sh.
[connection]
wifi.powersave = 2
